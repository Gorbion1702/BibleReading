<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Reading Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Bersihkan tanda tanya /? di URL secara otomatis saat halaman dimuat
        if (window.location.search === '?') {
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const SUPABASE_URL = 'https://srmaojepdzxmgeefzbsc.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8ZRLF_VvsvQMjKcmspcrqQ_s88fHQYt';
        
        let supabaseClient;
        if (typeof supabase !== 'undefined') {
            supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        } else {
            console.error("Supabase library is not loaded properly.");
        }

        let isLoginMode = true;

        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const subtitle = document.getElementById('auth-subtitle');
            const btn = document.getElementById('auth-btn');
            const toggleText = document.getElementById('auth-toggle-text');

            const errorMsg = document.getElementById('auth-error-message');
            const successMsg = document.getElementById('auth-success-message');
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            if (isLoginMode) {
                title.innerText = "Welcome Back";
                subtitle.innerText = "Login to your Bible Community";
                btn.innerText = "Login";
                toggleText.innerHTML = 'Belum punya akun? <button type="button" onclick="toggleAuthMode()" class="text-rosewood font-bold hover:underline ml-1">Daftar sekarang</button>';
            } else {
                title.innerText = "Buat Akun Baru";
                subtitle.innerText = "Bergabung dengan Komunitas Alkitab";
                btn.innerText = "Register";
                toggleText.innerHTML = 'Sudah punya akun? <button type="button" onclick="toggleAuthMode()" class="text-rosewood font-bold hover:underline ml-1">Login di sini</button>';
            }
        }

        async function handleAuth(event) {
            if (event) event.preventDefault();
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const btn = document.getElementById('auth-btn');
            const errorMsg = document.getElementById('auth-error-message');
            const successMsg = document.getElementById('auth-success-message');
            const originalBtnText = btn.innerText;

            if (!supabaseClient) {
                errorMsg.innerText = "Koneksi ke database gagal. Coba refresh halaman.";
                errorMsg.classList.remove('hidden');
                return false;
            }

            btn.innerText = 'Mohon tunggu...';
            btn.disabled = true;
            errorMsg.classList.add('hidden');
            successMsg.classList.add('hidden');

            try {
                let result;
                if (isLoginMode) {
                    result = await supabaseClient.auth.signInWithPassword({ email, password });
                } else {
                    result = await supabaseClient.auth.signUp({ email, password });
                }

                if (result.error) {
                    throw result.error;
                }

                if (!isLoginMode && result.data.user && result.data.user.identities && result.data.user.identities.length === 0) {
                    throw new Error("Email ini sudah terdaftar. Silakan login.");
                }

                if (!isLoginMode) {
                    successMsg.innerText = "Pendaftaran berhasil! Anda akan segera masuk...";
                    successMsg.classList.remove('hidden');
                    setTimeout(() => {
                        showMainApp();
                    }, 1500);
                } else {
                    showMainApp();
                }

            } catch (error) {
                console.error("Auth Error:", error.message);
                if (error.message.includes("Signups not allowed") || error.message.includes("disabled")) {
                    errorMsg.innerHTML = "<strong>Pendaftaran dinonaktifkan.</strong><br>Aktifkan 'Allow new users to sign up' di Supabase Dashboard > Authentication > Providers > Email.";
                } else if (error.message.includes("Invalid login credentials")) {
                    errorMsg.innerText = "Email atau password salah.";
                } else {
                    errorMsg.innerText = error.message;
                }
                errorMsg.classList.remove('hidden');
            } finally {
                btn.innerText = originalBtnText;
                btn.disabled = false;
            }
            return false;
        }

        function showMainApp() {
            document.getElementById('login-view').classList.remove('active');
            document.getElementById('login-view').classList.add('hidden');
            document.getElementById('main-view').classList.remove('hidden');
            document.getElementById('main-view').classList.add('flex');
            navigate('home');
            loadUserProfile();
            loadSharings();
            loadPrayers();
        }

        async function logout() {
            if (supabaseClient) {
                await supabaseClient.auth.signOut();
            }
            document.getElementById('main-view').classList.remove('flex');
            document.getElementById('main-view').classList.add('hidden');
            document.getElementById('login-view').classList.remove('hidden');
            document.getElementById('login-view').classList.add('active');
            document.getElementById('auth-email').value = '';
            document.getElementById('auth-password').value = '';
            isLoginMode = true;
            toggleAuthMode();
            toggleAuthMode(); 
        }

        function navigate(sectionId) {
            document.querySelectorAll('.content-section').forEach(sec => sec.classList.add('hidden'));
            document.getElementById('sec-' + sectionId).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blush', 'font-bold');
                if (btn.dataset.target === sectionId) {
                    btn.classList.add('text-blush', 'font-bold');
                }
            });
        }

        function selectFeeling(btn, feeling) {
            document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            const msgEl = document.getElementById('feeling-message');
            msgEl.classList.remove('hidden');
            
            const messages = {
                'Happy': 'Puji Tuhan! Kiranya sukacita-Nya terus mengalir dalam hidupmu hari ini. Bagikan kebahagiaanmu dengan orang lain!',
                'Peaceful': 'Damai sejahtera Allah yang melampaui segala akal memelihara hati dan pikiranmu. Nikmati ketenangan ini.',
                'Sad': 'Tuhan dekat dengan mereka yang patah hati. Tak apa bersedih, mari datang kepada-Nya dalam doa.',
                'Anxious': 'Serahkanlah segala kekuatiranmu kepada-Nya, sebab Ia yang memelihara kamu (1 Petrus 5:7).',
                'Angry': 'Tarik napas panjang. Biarkan kasih Tuhan meredakan kemarahan di hatimu hari ini.',
                'Tired': 'Marilah kepada-Ku, semua yang letih lesu dan berbeban berat, Aku akan memberi kelegaan kepadamu (Matius 11:28).'
            };
            msgEl.innerText = messages[feeling];
        }

        async function loadUserProfile() {
            if (!supabaseClient) return;
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                document.getElementById('profile-email').value = user.email;
                const fullName = user.user_metadata?.full_name || '';
                document.getElementById('profile-name').value = fullName;
                updateAvatarUI(user.email, fullName);
            }
        }

        function updateAvatarUI(email, fullName) {
            const displayName = fullName || email.split('@')[0];
            document.getElementById('display-name-title').innerText = displayName;
            
            const initial = displayName.charAt(0).toUpperCase();
            document.getElementById('profile-avatar-text').innerText = initial;
        }

        async function getUserDisplayName() {
            if (!supabaseClient) return "User";
            const { data: { user } } = await supabaseClient.auth.getUser();
            if (user) {
                if (user.user_metadata && user.user_metadata.full_name) {
                    return user.user_metadata.full_name;
                }
                return user.email.split('@')[0];
            }
            return "User";
        }

        async function handleProfileUpdate(event) {
            if (event) event.preventDefault();
            const btn = document.getElementById('update-profile-btn');
            const msgEl = document.getElementById('profile-msg');
            const newName = document.getElementById('profile-name').value;
            
            btn.innerText = 'Menyimpan...';
            btn.disabled = true;

            try {
                const { data, error } = await supabaseClient.auth.updateUser({
                    data: { full_name: newName }
                });

                if (error) throw error;

                msgEl.innerText = "Profile berhasil diperbarui!";
                msgEl.className = "mb-4 p-3 rounded text-sm text-center bg-green-100 text-green-700 border border-green-200 block";
                updateAvatarUI(data.user.email, newName);
            } catch (error) {
                msgEl.innerText = error.message;
                msgEl.className = "mb-4 p-3 rounded text-sm text-center bg-red-100 text-red-700 border border-red-200 block";
            } finally {
                btn.innerText = 'Simpan Profile';
                btn.disabled = false;
                setTimeout(() => msgEl.classList.add('hidden'), 3000);
            }
            return false;
        }

        async function handlePasswordChange(event) {
            if (event) event.preventDefault();
            const btn = document.getElementById('update-password-btn');
            const msgEl = document.getElementById('profile-msg');
            const newPassword = document.getElementById('profile-new-password').value;
            
            btn.innerText = 'Memperbarui...';
            btn.disabled = true;

            try {
                const { error } = await supabaseClient.auth.updateUser({
                    password: newPassword
                });

                if (error) throw error;

                msgEl.innerText = "Password berhasil diubah!";
                msgEl.className = "mb-4 p-3 rounded text-sm text-center bg-green-100 text-green-700 border border-green-200 block";
                document.getElementById('profile-new-password').value = '';
            } catch (error) {
                msgEl.innerText = error.message;
                msgEl.className = "mb-4 p-3 rounded text-sm text-center bg-red-100 text-red-700 border border-green-200 block";
            } finally {
                btn.innerText = 'Ubah Password';
                btn.disabled = false;
                setTimeout(() => msgEl.classList.add('hidden'), 3000);
            }
            return false;
        }

        async function loadSharings() {
            try {
                const { data, error } = await supabaseClient
                    .from('sharings')
                    .select('*')
                    .order('created_at', { ascending: false });

                const listEl = document.getElementById('sharing-list');
                listEl.innerHTML = '';
                
                if (error || !data || data.length === 0) {
                    listEl.innerHTML = `
                        <div class="border-b border-misty border-opacity-30 pb-4">
                            <div class="flex items-center gap-2 mb-1">
                                <div class="w-8 h-8 rounded-full bg-blush flex items-center justify-center text-rosewood font-bold text-sm">A</div>
                                <span class="font-bold text-midnight text-sm">Andi (Contoh)</span>
                            </div>
                            <p class="text-sm pl-10">Ayat Yohanes 3:16 hari ini mengingatkan saya bahwa kasih Tuhan tidak bersyarat.</p>
                        </div>
                    `;
                    return;
                }

                data.forEach(item => {
                    listEl.innerHTML += `
                        <div class="border-b border-misty border-opacity-30 pb-4">
                            <div class="flex items-center gap-2 mb-1">
                                <div class="w-8 h-8 rounded-full bg-blush flex items-center justify-center text-rosewood font-bold text-sm">${(item.user_name || 'U').charAt(0).toUpperCase()}</div>
                                <span class="font-bold text-midnight text-sm">${item.user_name || 'User'}</span>
                            </div>
                            <p class="text-sm pl-10">${item.text}</p>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Gagal memuat sharing:", error);
            }
        }

        async function postSharing(event) {
            if (event) event.preventDefault();
            const inputEl = document.getElementById('sharing-input');
            const text = inputEl.value;
            const userName = await getUserDisplayName();

            try {
                const { error } = await supabaseClient
                    .from('sharings')
                    .insert([{ text: text, user_name: userName }]);

                if (error) throw error;

                inputEl.value = '';
                loadSharings();
            } catch (error) {
                console.error("Gagal memposting sharing:", error);
                alert("Gagal memposting. Pastikan tabel 'sharings' sudah dibuat di Supabase.");
            }
            return false;
        }

        async function loadPrayers() {
            try {
                const { data, error } = await supabaseClient
                    .from('prayers')
                    .select('*')
                    .order('created_at', { ascending: false });

                const listEl = document.getElementById('prayer-list');
                listEl.innerHTML = '';
                
                if (error || !data || data.length === 0) {
                    listEl.innerHTML = `
                        <div class="bg-vanilla p-3 rounded-lg border border-misty">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-bold text-sm text-rosewood">Budi (Contoh)</span>
                                <button type="button" class="text-xs flex items-center gap-1 text-sage hover:text-midnight transition" onclick="alert('Anda telah berdoa untuk ini.')">
                                    <i class="ph ph-hands-praying"></i> Berdoa
                                </button>
                            </div>
                            <p class="text-sm">Mohon doa untuk ibu saya yang sedang sakit di rumah sakit.</p>
                        </div>
                    `;
                    return;
                }

                data.forEach(item => {
                    listEl.innerHTML += `
                        <div class="bg-vanilla p-3 rounded-lg border border-misty">
                            <div class="flex justify-between items-start mb-2">
                                <span class="font-bold text-sm text-rosewood">${item.user_name || 'User'}</span>
                                <button type="button" class="text-xs flex items-center gap-1 text-sage hover:text-midnight transition" onclick="alert('Terima kasih, Anda telah mendukung dalam doa.')">
                                    <i class="ph ph-hands-praying"></i> Berdoa
                                </button>
                            </div>
                            <p class="text-sm">${item.text}</p>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Gagal memuat doa:", error);
            }
        }

        async function postPrayer(event) {
            if (event) event.preventDefault();
            const inputEl = document.getElementById('prayer-input');
            const text = inputEl.value;
            const userName = await getUserDisplayName();

            try {
                const { error } = await supabaseClient
                    .from('prayers')
                    .insert([{ text: text, user_name: userName }]);

                if (error) throw error;

                inputEl.value = '';
                loadPrayers();
            } catch (error) {
                console.error("Gagal mengirim doa:", error);
                alert("Gagal mengirim pokok doa. Pastikan tabel 'prayers' sudah dibuat di Supabase.");
            }
            return false;
        }

        document.addEventListener('DOMContentLoaded', async () => {
            if (window.location.search === '?') {
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            if (supabaseClient) {
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session) {
                    showMainApp();
                }
            }
        });

    </script>
</body>
</html>
